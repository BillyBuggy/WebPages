    <script>
      // ***** Was file ArduinoNotesJavaScript.js *****
      // Usages of note() function:
      //   note( Db );         // Notes:
      //                       //   C, Db, D, Eb, E, F, Gb, G, Ab, A, Bb, B, _
      //                       // (Default octave 4, duration 200ms)
      //                       // (_ is silence or a musical "rest")
      //   note( Db, 4 );      // Note and octave
      //   note( Db, 4, 100 ); // Note, octave, duration (ms)
      //   note( Db, 4, HN );  // Note, octave, musical note duration:
                               // WN, HN, QN, EN, SN, TN = Whole, Half, etc.
                               // WHN 1.5, HQN 3/4, QEN 3/8, ESN 3/16, STN 3/32
      // API:
      //   buttonPressed (n)    ret ONCE a button   press of n times,
      //   button1Pressed(n)                        then resets it.
      //   button2Pressed(n)
      //   button3Pressed(n)
      //   Call inside note loops:
      //     gFrameNoNotesUpdate();
      // Can set global variables:
      //   gOctave        = Octave being played            (default 4)
      //   gNoteLen       = note length in millisec (ms)   (default 400ms)
      //   gNoteLen       = -120  (negative is BPM)        (corresp 400ms)
      //   gNoteOnPercent = % of gNoteLen that note plays  (default 90)

      document.writeln( ">> (Was) Inside ArduinoNotesJavaScript.js" )

      var gFrameTimeNotes    = -999.0;
      var gFrameNoNotes      = 0;
      var gPrintItMaybeNotes = false;
      function gFrameNoNotesUpdate() {
        if ( millis() < gFrameTimeNotes+100 ) {  //10 "frames"/sec [No delay()]
          gPrintItMaybeNotes = false;
          return;
        }
        ++gFrameNoNotes;
        gPrintItMaybeNotes = true;
        gFrameTimeNotes = millis();
      }
      var gOnceDone = false;

      //+ #define repeat for(;;)

      var noteFreqBase = 8.1757989156;

      var C=0, Db=1,  D=2,  Eb=3, E=4, F=5, Gb=6, G=7, Ab=8,         // NOTES @
          A=9, Bb=10, B=11, _=-1;
      var WN=-1.0, HN=-2.0, QN=-4.0, EN=-8.0, SN=-16.0, TN=-32.0; //DURATIONS @
      var STN=-10.67;  // 3/32 note    (Hack, sorry -Nye.  The other guy
      var ESN=-5.333;  // 3/16 note     used "E+S" for 3/16 notes.)
      var QEN=-2.667;  // 3/8  note    // NOTE: QEN = 1 / ( (1/QN)+(1/EN) )
      var QSN=-3.200;  // 5/16 note    // NOTE: QSN = 1 / ( (1/QN)+(1/SN) )
      var QTN=-3.556;  // 9/32 note    // NOTE: QTN = 1 / ( (1/QN)+(1/TN) )
      var HQN=-1.333;  // 3/4  note    // NOTE: HQN = 1 / ( (1/HN)+(1/QN) )
      var WHN=-0.667;  // 1.5  note    // NOTE: WHN = 1 / ( (1/WN)+(1/HN) )

      //--- User settable defaults (if no arg given):
      var gOctave        = 4;
      var gNoteLen       = 400; // Pos ms, neg BPM, eg, gNoteLen = -120
      var gNoteOnPercent = 90;  // Assume 4/4 time signature:
                                //   WholeNoteDur=4*60/BPM
                                // BPM sets duration of quater note as one beat

      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      function noteLenFun( noteLen ) {    // For internal use.
        // Example: gNoteLen = -120 corresponds to gNoteLen = 400.
        var loc_gNoteLen = gNoteLen > 0 ? gNoteLen              //--- Pos msec
                                        : -4*60000/5/gNoteLen;  //--- Neg BPM
        if      (noteLen == -9999.0) noteLen = loc_gNoteLen;    // QN=-4.0
        else if (noteLen <  0      ) noteLen = loc_gNoteLen*4 / (-noteLen);
        //D Serial.print  ( "noteLenFun(): return " );
        //D Serial.println( noteLen );
        return noteLen;
      }
      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      function note( noteNum, octave=-1, noteLen=-9999.0 ) {
        //D Serial.println("                                 DEBUG:TOPnote()");
        if (octave  == -1 )
            octave = gOctave;                  // Default value
        noteLen = noteLenFun(noteLen);         // Converts negatives, etc.
        if ( noteNum == _ )                    // Not silence (musical "rest")
        //sleepSync(noteLen)
          sleepSync(Math.floor( noteLen*(gNoteOnPercent/100.0) ) ); // 9-20-2022
        else {
          //X tone( gSpeakerPin,
          //X       noteFreqBase *      pow(2,octave + noteNum/12.0),
          //X       Math.floor( noteLen*(gNoteOnPercent/100.0) ) );
          noteFun(  noteFreqBase * Math.pow(2,octave + noteNum/12.0),
                    Math.floor( noteLen*(gNoteOnPercent/100.0) ) );
        }
      }   // End: note()

      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      //### From: https://teropa.info/blog/2016/08/10/frequency-and-pitch.html
      //### let synthOb = new AudioContext(); Run / Edit
      //### let oscOb   = synthOb.createOscillator();
      //### oscOb.frequency.setValueAtTime(440, synthOb.currentTime);
      //### oscOb.frequency.linearRampToValueAtTime( 440*Math.pow(2,1/12),
      //###                                          synthOb.currentTime + 1);
      //### oscOb.connect(synthOb.destination);
      //### oscOb.start();
      //### oscOb.stop(synthOb.currentTime + 3);

          var synthOb, oscOb, gainOb;

          function setupAudio () {
            console.log("* setupAudio: TOP")
            var AudioContext = window.AudioContext ||       // Chrome
                               window.webkitAudioContext    // Safari
            synthOb = new AudioContext;
            oscOb   = synthOb.createOscillator();
            gainOb  = synthOb.createGain();
            oscOb .connect(gainOb)
            gainOb.connect(synthOb.destination)
            gainOb.gain.value=0
            oscOb.start()
            console.log("  setupAudio: BOT")
          }
          setTimeout("setupAudio()", 200)

          // From https://www.sitepoint.com/delay-sleep-pause-wait (11/24/2019)
          function sleepSync(ms) {
            var startTime = new Date().getTime();
            //X: Why does "new Date()" need to be in the loop?
            for ( var i=0 ; i<1e8 ; i++ )
              if ( (new Date().getTime() - startTime) > ms )
                break;
            //D console.log("  (sleepSync: %d ms  %d passes)", ms, i);
          }
          function noteFun( freq, /*NN*** type, ***/ dur ) {
            //D console.log("  noteFun(): freq = %.2f dur = %d", freq, dur);
            var type;
            type = "sine";
            type = "square";
            //X oscOb.frequency.value = freq;
            //X: Next line got rid of glissando (pitch/freq sliding btwn notes)
            oscOb.frequency.setValueAtTime(freq, synthOb.currentTime);
            oscOb.type = type
            if ( type == "sine" ) gainOb.gain.value=1;   // "sine wave"
            else                  gainOb.gain.value=.1;  // "square wave"
            sleepSync (dur * gNoteOnPercent / 100)
            gainOb.gain.value=0;
            sleepSync (dur * (100-gNoteOnPercent) / 100)
          }

      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      var NBUTTONS = 5;

      var gButtonPressedCount = [0,0,0,0,0]; // Set 1 *once* f each press;
                                             // button#Pressed(n) returns
      var gPlayingInternal   =  1;           //   then resets
      var gStopButtonNo      = -1;
      var gStop_nPresses   = -1;
      var lastPressedButton1 = 0
      var lastPressedButton2 = 0
      var lastPressedButton3 = 0
      var lastPressedButton4 = 0
      var lastPressedButton5 = 0

      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      function stopOnButtonPress(buttonNo, nPresses) {   // Set up stop button.
        gStopButtonNo  = buttonNo;
        gStop_nPresses = nPresses;
      }

      function button1Pressed( n ) {
        if ( gButtonPressedCount[1-1] == n ) {   // Index 0
             gButtonPressedCount[1-1] = 0;
             return n;
        }
        else
          return 0;
      }
      function button2Pressed( n ) {
        if ( gButtonPressedCount[2-1] == n ) {   // Index 1
             gButtonPressedCount[2-1] = 0;
             return n;
        }
        else

      }
      function button3Pressed( n ) {
        if ( gButtonPressedCount[3-1] == n ) {   // Index 2
             gButtonPressedCount[3-1] = 0;
             return n;
        }
        else
          return 0;
      }
      function button4Pressed( n ) {
        if ( gButtonPressedCount[4-1] == n ) {   // Index 3
             gButtonPressedCount[4-1] = 0;
             return n;
        }
        else
          return 0;
      }
      function button5Pressed( n ) {
        if ( gButtonPressedCount[5-1] == n ) {   // Index 4
             gButtonPressedCount[5-1] = 0;
             return n;
        }
        else
          return 0;
      }
      function buttonPressed (n) { return button1Pressed(n); }  // Back compat

      function resetButtonPressed() {
        gButtonPressedCount[0] = 0;
        gButtonPressedCount[1] = 0;
        gButtonPressedCount[2] = 0;
        gButtonPressedCount[3] = 0;
        gButtonPressedCount[4] = 0;
      }

      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      document.addEventListener( 'keydown', my_onKeyDown, false );
      function my_onKeyDown(event) {
        //D console.log('****************************************');
        //D console.log('***** onKeyDown: key=',event.key, '*****');
        //D console.log('****************************************');
        { lastPressedButton1 = lastPressedButton2 = lastPressedButton3 =
          lastPressedButton4 = lastPressedButton5 = 0 }
        switch ( event.key ) {
          case '1': gButtonPressedCount[0] = 1; lastPressedButton1 = 1 ; break;
          case '2': gButtonPressedCount[1] = 1; lastPressedButton2 = 1 ; break;
          case '3': gButtonPressedCount[2] = 1; lastPressedButton3 = 1 ; break;
          case '4': gButtonPressedCount[3] = 1; lastPressedButton4 = 1 ; break;
          case '5': gButtonPressedCount[4] = 1; lastPressedButton5 = 1 ; break;
        }
        //### switch ( event.keyCode ) {
        //###   case keys.UP:     ... ; break;
        //###   case keys.BOTTOM: ... ; break;
        //###   case keys.LEFT:   ... ; break;
        //###   case keys.RIGHT:  ... ; break;
        //###   default:               
        //### }
      }

      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      //- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
      // Usage example:    (See BillTestChordMaker.pde)
      //   var majorNorm = [ 4, 0,QN,             4,QN,       7,QN,     4,QN ];
      //   var majorDoub = [ 8, 0,EN, 0,EN, 4,EN, 4,EN, 7,EN, 7,EN,4,EN,4,EN ];
      //   var minorNorm = [ 4, 0,QN,             3,QN,       7,QN,     3,QN ];
      //   var minorDoub = [ 8, 0,EN, 0,EN, 3,EN, 3,EN, 7,EN, 7,EN,3,EN,3,EN ];
      //
      //   chordmaker (C,3,WN,majorNorm);
      //   chordmaker (A,3,WN,minorNorm);
      //   chordmaker (F,3,WN,majorNorm);
      //   chordmaker (G,3,WN,majorNorm);
      //
      //   chordmaker (C,3,WN,majorDoub);
      //   chordmaker (A,3,WN,minorDoub);
      //   chordmaker (F,3,WN,majorDoub);
      //   chordmaker (G,3,WN,majorDoub);

      function chordmaker ( chordNoteNum, chordOctave,
                            chordNoteLen, noteOffsets ) {
        var n = noteOffsets[0];
        var noteNum;
        var noteLen;
        for ( var k=1 ; k<=n ; ++k ) {
          noteNum =   chordNoteNum + noteOffsets[k*2-1];
          noteLen = - chordNoteLen * noteOffsets[k*2  ];
          note( noteNum, chordOctave, noteLen );
        }
      }
    </script>
